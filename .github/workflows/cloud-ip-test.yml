name: cloud-ip-test (KOSIS 청크 크기 실험)
on:
  push:
    paths: ['.github/workflows/cloud-ip-test.yml']
  workflow_dispatch: {}
jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: KOSIS 청크 크기별 응답시간 (주간 매매 objL1=ALL)
        env:
          KOSIS_API_KEY: ${{ secrets.KOSIS_API_KEY || secrets.KOSIS }}
        run: |
          python - << 'PYEOF'
          import os, json, time, datetime as dt, urllib.parse, urllib.request
          KEY=os.environ.get('KOSIS_API_KEY','')
          API='https://kosis.kr/openapi/Param/statisticsParameterData.do'
          today=dt.date.today()
          print('KOSIS key len', len(KEY), '| today', today, '\n')

          def fetch(weeks, timeout):
              start=today-dt.timedelta(weeks=weeks)
              q=dict(method='getList',apiKey=KEY,format='json',jsonVD='Y',
                     orgId='408',tblId='DT_304004_WEEK_001_B',
                     objL1='ALL',itmId='ALL',prdSe='F',
                     startPrdDe=start.strftime('%Y%m%d'),endPrdDe=today.strftime('%Y%m%d'))
              url=API+'?'+urllib.parse.urlencode(q)
              t0=time.time()
              try:
                  req=urllib.request.Request(url,headers={'User-Agent':'Mozilla/5.0'})
                  with urllib.request.urlopen(req,timeout=timeout) as r:
                      body=r.read().decode('utf-8','replace')
                  el=time.time()-t0
                  j=json.loads(body)
                  if isinstance(j,list):
                      return el, 'OK rows=%d (~%d셀)'%(len(j),len(j))
                  return el, 'ERR '+str(j.get('err'))+' '+str(j.get('errMsg'))[:40]
              except Exception as e:
                  return time.time()-t0, 'TIMEOUT/FAIL '+type(e).__name__

          # 2패스로 간헐성 확인. 각 사이즈 단일 시도(재시도 없음), 타임아웃 100s로 실지연 측정
          for p in (1,2):
              print('===== PASS %d ====='%p)
              for wk in (4,13,26,39,52):
                  el,st=fetch(wk,100)
                  print('  %2d주 : %6.1fs  %s'%(wk,el,st))
                  time.sleep(2)
              print()
          PYEOF
