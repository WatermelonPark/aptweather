name: cloud-ip-test (KOSIS IP 신뢰성 샘플링)
on:
  push:
    paths: ['.github/workflows/cloud-ip-test.yml']
  workflow_dispatch: {}
jobs:
  probe:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        n: [9,10,11,12,13,14,15,16]
    steps:
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: 샘플 ${{ matrix.n }} — egress IP + 52주 KOSIS 조회
        env:
          KOSIS_API_KEY: ${{ secrets.KOSIS_API_KEY || secrets.KOSIS }}
        run: |
          python - << 'PYEOF'
          import os, json, time, datetime as dt, urllib.parse, urllib.request
          def get(url,to=15):
              req=urllib.request.Request(url,headers={'User-Agent':'Mozilla/5.0'})
              with urllib.request.urlopen(req,timeout=to) as r: return r.read().decode('utf-8','replace')
          try: ip=get('https://api.ipify.org').strip()
          except Exception as e: ip='?('+type(e).__name__+')'
          KEY=os.environ.get('KOSIS_API_KEY',''); today=dt.date.today()
          start=today-dt.timedelta(weeks=52)
          q=dict(method='getList',apiKey=KEY,format='json',jsonVD='Y',orgId='408',
                 tblId='DT_304004_WEEK_001_B',objL1='ALL',itmId='ALL',prdSe='F',
                 startPrdDe=start.strftime('%Y%m%d'),endPrdDe=today.strftime('%Y%m%d'))
          url='https://kosis.kr/openapi/Param/statisticsParameterData.do?'+urllib.parse.urlencode(q)
          # 실배치처럼 timeout=60, 3재시도로 최종 성패 판정
          res='?'; t0=time.time()
          for i in range(3):
              try:
                  body=get(url,60); j=json.loads(body)
                  res=('OK rows=%d'%len(j)) if isinstance(j,list) else ('ERR '+str(j.get('err')))
                  break
              except Exception as e:
                  res='TIMEOUT/FAIL '+type(e).__name__
                  time.sleep(3*(i+1))
          print('IP=%-16s  %6.1fs  %s'%(ip,time.time()-t0,res))
          PYEOF
