name: 심화통계 자동 갱신 (KOSIS)

# ⚠️ KOSIS가 GitHub 러너(해외 IP)를 차단해 이 워크플로에선 KOSIS 갱신이 실패한다(2026-07 확인).
# 실제 갱신은 로컬 작업 스케줄러(tools/run_weekly_update.bat, 매주 금 09:30)가 담당하고,
# 이 워크플로는 차단 해제 시를 대비한 폴백으로 유지한다 (변경 없으면 아무것도 안 함).
on:
  schedule:
    # 매주 금요일 09:00 KST (주간동향 목요일 발표 다음날) — 인허가는 새 반기 나올 때만 변경됨
    - cron: '0 0 * * 5'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: KOSIS 데이터 갱신
        env:
          # 시크릿 이름은 KOSIS_API_KEY 또는 KOSIS 어느 쪽이든 인식
          KOSIS_API_KEY: ${{ secrets.KOSIS_API_KEY || secrets.KOSIS }}
          # 한국은행 ECOS (CD금리) — 없으면 금리만 건너뛰고 나머지는 정상 갱신
          ECOS_API_KEY: ${{ secrets.ECOS_API_KEY || secrets.ECOS }}
          # 공공데이터포털 (입주예정물량) — 없으면 입주물량만 건너뜀
          DATA_GO_KR_KEY: ${{ secrets.DATA_GO_KR_KEY || secrets.DATAGOKR }}
          # 부동산원 R-ONE (주간 속보) — 없으면 KOSIS 폴백
          RONE_API_KEY: ${{ secrets.RONE_API_KEY || secrets.RONE }}
        run: |
          if [ -z "$KOSIS_API_KEY" ]; then
            echo "::warning::KOSIS_API_KEY 시크릿이 없어 갱신을 건너뜁니다. 저장소 Settings > Secrets에 추가하세요."
            exit 0
          fi
          python tools/update_adv_data.py --update

      - name: 변경 시 커밋·푸시
        run: |
          if git diff --quiet index.html; then
            echo "변경 없음"
            exit 0
          fi
          git config user.name "stats-bot"
          git config user.email "actions@users.noreply.github.com"
          git add index.html
          git commit -m "통계 데이터 자동 갱신 (KOSIS)"
          git push

      - name: 주간 알림 발송 (Buttondown)
        env:
          # 시크릿 없으면 발송만 건너뜀 (주간 데이터가 갱신된 실행에서만 발송)
          BUTTONDOWN_API_KEY: ${{ secrets.BUTTONDOWN_API_KEY || secrets.BUTTONDOWN }}
        run: python tools/send_newsletter.py
