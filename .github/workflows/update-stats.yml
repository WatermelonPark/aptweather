name: 심화통계 자동 갱신 (KOSIS)

on:
  schedule:
    # 매주 금요일 09:00 KST (주간동향 목요일 발표 다음날) — 인허가는 새 반기 나올 때만 변경됨
    - cron: '0 0 * * 5'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: KOSIS 데이터 갱신
        env:
          # 시크릿 이름은 KOSIS_API_KEY 또는 KOSIS 어느 쪽이든 인식
          KOSIS_API_KEY: ${{ secrets.KOSIS_API_KEY || secrets.KOSIS }}
        run: |
          if [ -z "$KOSIS_API_KEY" ]; then
            echo "::warning::KOSIS_API_KEY 시크릿이 없어 갱신을 건너뜁니다. 저장소 Settings > Secrets에 추가하세요."
            exit 0
          fi
          python tools/update_adv_data.py --update

      - name: 변경 시 커밋·푸시
        run: |
          if git diff --quiet index.html; then
            echo "변경 없음"
            exit 0
          fi
          git config user.name "stats-bot"
          git config user.email "actions@users.noreply.github.com"
          git add index.html
          git commit -m "심화통계 데이터 자동 갱신 (KOSIS)"
          git push
