<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.css">
<title>페이지를 찾을 수 없습니다 — 아공맵</title>
<meta name="robots" content="noindex">
<link rel="icon" type="image/png" href="/app_icon.png">
<style>b,strong{font-weight:600}
  :root{--ink:#131e24;--ink2:#4c5f66;--paper:#f4f6f5;--muted:#5e6f74;--line:#c4cec9;--jeonse:#6c4ab6;--stock:#1f8a70}
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:var(--paper);color:var(--ink);min-height:100vh;
    font-family:'Pretendard Variable','Pretendard',-apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo','Malgun Gothic',sans-serif;
    display:flex;align-items:center;justify-content:center;padding:24px;word-break:keep-all;-webkit-font-smoothing:antialiased}
  .wrap{max-width:440px;text-align:center;position:relative}
  .wrap::before{content:"";position:absolute;left:50%;top:-40px;width:280px;height:280px;
    transform:translateX(-50%);border:1.5px solid var(--line);border-radius:0;opacity:.4;z-index:0}
  .inner{position:relative;z-index:1}
  .code{font-size:72px;font-weight:600;letter-spacing:-.03em;color:var(--ink);line-height:1;margin-bottom:8px}
  .cycle{font-size:14px;font-weight:600;color:var(--ink2);margin-bottom:20px}
  h1{font-size:24px;font-weight:700;letter-spacing:-.02em;line-height:1.3;margin-bottom:14px}
  p{font-size:15px;color:var(--ink2);line-height:1.6;margin-bottom:28px}
  a.home{display:inline-block;background:var(--ink);color:#fff;text-decoration:none;
    font-size:16px;font-weight:600;padding:14px 32px;border-radius:0;box-shadow:0 4px 16px rgba(22,32,58,.18)}
  a.home:active{transform:scale(.98)}
  .foot{margin-top:24px;font-size:12.5px;color:var(--muted)}
</style>
</head>
<body>
<div class="wrap"><div class="inner">
  <div class="code">404</div>
  <div class="cycle">아공맵</div>
  <h1>찾으시는 페이지가 없네요</h1>
  <p>주소가 바뀌었거나 사라진 페이지예요.<br>공급 사이클 리포트는 아래에서 다시 시작할 수 있습니다.</p>
  <a class="home" href="/">홈으로 가기 →</a>
  <div class="foot">agongmap.co.kr</div>
</div></div>
</body>
</html>
